# Remap prefix from ctrl+b to ctrl+space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable mouse support
set -g mouse on
# Baby got (scroll)back (buffer)
set -g history-limit 50000
# Pass window titles to terminal (Moshi displays these)
set -g set-titles on
# Now it shows 1: Fixing auth... (your window title in tmux)
set -g set-titles-string "#I: #T"

# Start window numbering at 1 (Moshi displays from 1)
set -g base-index 1
setw -g pane-base-index 1
# Renumber all windows when any window is closed
set -g renumber-windows on
# Don't exit tmux when closing a session — switch to another
set -g detach-on-destroy off
# Zero-out escape time delay (snappier key response)
set -g escape-time 0
# Use system clipboard
set -g set-clipboard on

# Move status bar to the top
set-option -g status-position top

# Catppuccin theme
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style 'rounded'
# Show zoom indicator next to window name when pane is zoomed
set -g @catppuccin_window_current_text " #T#{?window_zoomed_flag, (zoomed),}"

# Load catppuccin BEFORE setting status modules
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Override uptime color to match battery (must be AFTER catppuccin loads)
set -g @catppuccin_status_uptime_icon_bg "#{E:@thm_lavender}"

# Status bar modules (must come AFTER catppuccin.tmux loads)
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"
# Conditional: battery on laptops, uptime on desktops
if-shell "pmset -g batt 2>/dev/null | grep -q 'InternalBattery'" \
    "set -agF status-right '#{E:@catppuccin_status_battery}'" \
    "set -ag status-right '#{E:@catppuccin_status_uptime}'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'wfxr/tmux-fzf-url'

# Auto-save sessions every 15 minutes
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
