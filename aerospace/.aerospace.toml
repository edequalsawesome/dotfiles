# AeroSpace - i3-like tiling window manager for macOS
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# Start AeroSpace at login
start-at-login = true

# Normalizations (keep these on — they prevent weird nesting)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion padding (space between stacked windows)
accordion-padding = 30

# Default layout
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Keep just the workspaces you'll actually use
persistent-workspaces = ["1", "2", "3", "4", "5"]

# Workspace-to-monitor assignments (gracefully falls back when unplugged)
[workspace-to-monitor-force-assignment]
1 = 'Studio Display'          # Ghostty
2 = 'Studio Display'          # Obsidian
4 = 'Built-in Retina Display' # Slack
5 = 'Studio Display'          # Overflow
# 3 (Safari) goes wherever — mood-dependent

[key-mapping]
    preset = 'qwerty'

# Gaps between windows and screen edges
[gaps]
    inner.horizontal = 5
    inner.vertical =   5
    outer.left =       5
    outer.bottom =     5
    outer.top =        5
    outer.right =      5

# === APP-TO-WORKSPACE ASSIGNMENTS ===
# When these apps open, they land on the right workspace automatically
# Find app-id with: aerospace list-apps
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 4'

# === MAIN KEYBINDINGS ===
[mode.main.binding]

    # Toggle between horizontal and vertical tiling
    alt-slash = 'layout tiles horizontal vertical'
    # Toggle accordion (stacked) layout
    alt-comma = 'layout accordion horizontal vertical'

    # Focus windows (arrow keys instead of vim h/j/k/l)
    alt-left = 'focus left'
    alt-down = 'focus down'
    alt-up = 'focus up'
    alt-right = 'focus right'

    # Move windows
    alt-shift-left = 'move left'
    alt-shift-down = 'move down'
    alt-shift-up = 'move up'
    alt-shift-right = 'move right'

    # Resize windows
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Fullscreen toggle
    alt-f = 'fullscreen'

    # Switch workspaces
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 0'

    # Move windows to workspaces
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'

    # Quick switch to last workspace
    alt-tab = 'workspace-back-and-forth'
    # Move workspace to next monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Focus the other monitor
    alt-backtick = 'focus-monitor --wrap-around next'
    # Move window to the other monitor
    alt-shift-backtick = 'move-node-to-monitor --wrap-around next'

    # Enter service mode
    alt-shift-semicolon = 'mode service'

# === SERVICE MODE (alt+shift+; to enter, esc to exit) ===
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # toggle floating
    backspace = ['close-all-windows-but-current', 'mode main']
